<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Application</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="add-bar">
            <h2>To-Do List</h2>
            <div class="input-field">
                <input type="text" class="add-input" placeholder="Enter your task">
                <button class="add-btn">Add</button>

            </div>
            <p id="warning">You must write something</p>
        </div>
        <div class="task-info">
            <ul class="task" id="task">
                <!--    
                <li class="task-list">
                    <input type="checkbox" name="" id="" >
                    <p class="typed-thing ">Gym workout</p>
                    <img src="./Resource/cross.png" alt="cross">
                </li>
                -->
            </ul>
        </div>
    </div>
    <script src="logic.js"></script>
</body>

</html>
